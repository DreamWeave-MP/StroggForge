name: Application CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main
    tags: ['*']

jobs:
  build:
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: DreamWeave-MP/StroggForge/.github/workflows/rustGlobalBuild.yml@v26
    secrets: inherit
    with:
      # Required: JSON array of binary names to build. Add more for monorepos.
      binary_names: '["ENTER_BINARY_NAME_HERE"]'

      # Optional: uncomment if the package is published to the AUR.
      # aur_package_name: ENTER_PACKAGE_NAME_HERE
      # git_username: ENTER_USERNAME_HERE
      # git_email: ENTER_EMAIL_HERE

      # Optional: set NEXUS_API_KEY and NEXUS_GROUP_IDS repository or organization secrets
      # to upload release archives to Nexus Mods. Use StroggForge's
      # .github/nexus_group_ids.template.json as the NEXUS_GROUP_IDS shape.

      # Optional: uncomment to notify dependent repositories on tagged releases.
      # dependent_repo_names: |
      #   DreamWeave-MP/DW-tools

      # Optional: set false if this project uses its own SSG for docs.
      # publish_docs: false

      # Optional: set false if this project does not publish to crates.io.
      # cargo_publish: false

      # Optional: set true if this project has Criterion benchmarks.
      # generate_benchmarks: true

      # Optional: set false if the project is not hosted by DreamWeave or does not use discord notifications
      # generate_discord_notification: false
