name: Corprus Crucible Manufacturing

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main
    tags: ['*']

jobs:
  build:
    uses: DreamWeave-MP/StroggForge/.github/workflows/rustGlobalBuild.yml@v6
    secrets: inherit
    with:
      # Required: JSON array of binary names to build. Add more for monorepos.
      binary_names: '["ENTER_BINARY_NAME_HERE"]'

      # Optional: uncomment if the package is published to the AUR.
      # aur_package_name: ENTER_PACKAGE_NAME_HERE
      # git_username: ENTER_USERNAME_HERE
      # git_email: ENTER_EMAIL_HERE

      # Optional: uncomment to notify dependent repositories on tagged releases.
      # dependent_repo_names: '["DreamWeave-MP/DW-tools"]'

      # Optional: set false if this project uses its own SSG for docs.
      # publish_docs: false

      # Optional: set false if this project does not publish to crates.io.
      # cargo_publish: false

      # Optional: set true if this project has Criterion benchmarks.
      # generate_benchmarks: true
