name: Library CI

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false
      DW_BOT_PAT:
        required: false
      DISCORD_CHANNEL_WEBHOOK:
        required: false
      DW_TOOLS_CHANNEL_WEBHOOK:
        required: false
    inputs:
      crate_names:
        type: string
        description: "JSON array of crate names to publish, e.g. '[\"my-lib\"]'. Must match [package].name in Cargo.toml."
        required: true

      dependent_repo_names:
        type: string
        description: "Dependent repositories to notify on tagged releases, one owner/repo per line. JSON arrays are still accepted for compatibility."
        required: false
        default: ''

      publish_docs:
        type: boolean
        required: false
        default: true
        description: "Build cargo doc and deploy to GitHub Pages. Disable if the project uses its own SSG."

      cargo_publish:
        type: boolean
        required: false
        default: true
        description: "Publish to crates.io on tagged releases; run a dry-run on all other pushes. Requires CARGO_REGISTRY_TOKEN secret."

      generate_changelog:
        type: boolean
        required: false
        default: true
        description: "Generate a CHANGELOG.md from git history and upload it to the release."

      generate_benchmarks:
        type: boolean
        required: false
        default: false
        description: "Run cargo bench, generate BENCHMARKS.md from Criterion output or the raw benchmark log, and upload it to the release."

jobs:
  # Ensure any previously-existing releases are deleted,
  # And create a new one with auto-generated changelog & workflow ID
  release_cleanup:
    uses: DreamWeave-MP/StroggForge/.github/workflows/createRelease.yml@v23
    secrets: inherit

  # Run the full test suite on all platforms. Blocks release.
  test:
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Tests
        run: cargo test --workspace --all-targets --all-features -- --show-output

  # Check formatting. Blocks release.
  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Formatting
        run: cargo fmt --all --check

  # Run Clippy at pedantic level. Blocks release.
  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -W clippy::pedantic -D warnings

  # Scan Cargo.lock against the RustSec advisory database. Blocks release.
  audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Cargo.lock
        run: cargo generate-lockfile
      - uses: taiki-e/install-action@cargo-audit
      - name: Run Cargo audit
        run: cargo audit
        working-directory: ${{ github.workspace }}

  # Verify each crate would be publishable to crates.io. Informational — does not block release.
  publish-dry-run:
    if: inputs.cargo_publish && github.ref_type != 'tag'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        crate_names: ${{ fromJson(inputs.crate_names) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v23
          path: .stroggforge
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Publish Dry Run
        run: |
          MANIFEST=$(bash .stroggforge/scripts/shared/resolve-crate-manifest.sh "${{ matrix.crate_names }}")
          cargo publish --dry-run --manifest-path "$MANIFEST"

  # Publish each crate to crates.io on tagged releases, after all quality gates pass.
  publish:
    if: inputs.cargo_publish && github.ref_type == 'tag'
    needs: [test, clippy, fmt, audit]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        crate_names: ${{ fromJson(inputs.crate_names) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v23
          path: .stroggforge
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          MANIFEST=$(bash .stroggforge/scripts/shared/resolve-crate-manifest.sh "${{ matrix.crate_names }}")
          cargo publish --manifest-path "$MANIFEST"

  # Build cargo doc and deploy to GitHub Pages.
  # Requires Pages to be enabled with "GitHub Actions" as the source in repo settings.
  docs:
    if: inputs.publish_docs && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, clippy, fmt, audit]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v23
          path: .stroggforge
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build Documentation
        run: cargo doc --no-deps --workspace
      - name: Create Index Redirect
        run: bash .stroggforge/scripts/shared/docs-index.sh '${{ inputs.crate_names }}' target/doc/index.html
      - uses: actions/configure-pages@v6.0.0
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: target/doc
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

  # Generate a CHANGELOG.md from git history and upload it to the release.
  changelog:
    if: inputs.generate_changelog && github.event_name != 'pull_request'
    needs: [release_cleanup, test, clippy, fmt, audit]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v23
          path: .stroggforge
      - name: Generate Changelog
        run: bash .stroggforge/scripts/shared/changelog.sh CHANGELOG.md
      - name: Upload Changelog to Release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.release_cleanup.outputs.release_name }}
          files: CHANGELOG.md

  # Run cargo bench, generate BENCHMARKS.md from Criterion output or the raw benchmark log, and upload to the release.
  benchmarks:
    if: inputs.generate_benchmarks && github.event_name != 'pull_request'
    needs: [release_cleanup, test, clippy, fmt, audit]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v23
          path: .stroggforge
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate Benchmark Docs
        run: bash .stroggforge/scripts/shared/generate-benchmark-docs.sh .stroggforge/.github/scripts/gen_benchmarks.py
      - name: Upload Benchmark Docs to Release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.release_cleanup.outputs.release_name }}
          files: BENCHMARKS.md

  # For workflows where users may now receive a new deliverable, notify them about it!
  call-discord-webhook:
    if: always() && github.event_name == 'push'
    needs: [test, fmt, clippy]
    uses: DreamWeave-MP/StroggForge/.github/workflows/discord.yml@v23
    secrets:
      WEBHOOK_URL: ${{ secrets.DISCORD_CHANNEL_WEBHOOK || secrets.DW_TOOLS_CHANNEL_WEBHOOK }}
    with:
      title: ${{ (needs.test.result == 'failure' || needs.fmt.result == 'failure' || needs.clippy.result == 'failure') && format('{0} pipeline failed! 😭', github.event.repository.name) || '' }}
      description: ${{ (needs.test.result == 'failure' || needs.fmt.result == 'failure' || needs.clippy.result == 'failure') && format('[Workflow Results](https://github.com/{0}/actions/runs/{1})', github.repository, github.run_id) || ''}}

  # For any repositories which use this one as a dependent,
  # notify them by creating an issue within the DreamWeave org's scope.
  nag-dependents:
    if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && inputs.dependent_repo_names != '' && inputs.dependent_repo_names != '[]'
    needs: [test, fmt, clippy]

    uses: DreamWeave-MP/StroggForge/.github/workflows/dependent.yml@v23

    secrets:
      DW_BOT_PAT: ${{ secrets.DW_BOT_PAT }}
    with:
      aur_package_name: ''
      dependent_repo_names: ${{ inputs.dependent_repo_names }}
