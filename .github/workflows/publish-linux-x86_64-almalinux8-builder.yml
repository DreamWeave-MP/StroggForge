name: Publish Linux x86_64 AlmaLinux 8 Builder Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - .github/container-images/linux-x86_64-almalinux8/Dockerfile
      - .github/workflows/publish-linux-x86_64-almalinux8-builder.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dreamweave-mp/stroggforge-linux-x86_64-almalinux8-builder

jobs:
  publish:
    name: Build and Publish Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Tags
        id: image-tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::12}"

          if [[ "$REF_TYPE" == tag ]]; then
            {
              echo 'tags<<EOF'
              echo "$IMAGE_NAME:$REF_NAME"
              echo "$IMAGE_NAME:sha-${SHORT_SHA}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SAFE_REF="$(printf '%s' "$REF_NAME" | tr '/[:upper:]' '-[:lower:]' | tr -cd 'a-z0-9_.-')"

          {
            echo 'tags<<EOF'
            echo "$IMAGE_NAME:test-${SAFE_REF}"
            echo "$IMAGE_NAME:sha-${SHORT_SHA}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/container-images/linux-x86_64-almalinux8/Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
