name: Corprus Crucible Manufacturing

on:
  workflow_call:
    secrets:
      VT_API_KEY:
        required: false
      NEXUS_API_KEY:
        required: false
      NEXUS_GROUP_IDS:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      AUR_SSH_PRIVATE_KEY:
        required: false
      DW_BOT_PAT:
        required: false
      DISCORD_CHANNEL_WEBHOOK:
        required: false
      DW_TOOLS_CHANNEL_WEBHOOK:
        required: false
    inputs:
      binary_names:
        type: string
        description: "JSON array of binary names to compile."
        required: true

      aur_package_name:
        type: string
        required: false
        default: ''

      dependent_repo_names:
        type: string
        description: "Dependent repositories to notify on tagged releases, one owner/repo per line. JSON arrays are still accepted for compatibility."
        required: false
        default: ''

      git_username:
        type: string
        required: false
        default: magicaldave

      git_email:
        type: string
        required: false
        default: corleycomputerrepair@protonmail.ch

      publish_docs:
        type: boolean
        required: false
        default: true
        description: "Build cargo doc and deploy to GitHub Pages. Disable if the project uses its own SSG."

      cargo_publish:
        type: boolean
        required: false
        default: true
        description: "Publish to crates.io on tagged releases; run a dry-run on all other pushes. Requires CARGO_REGISTRY_TOKEN secret."

      generate_changelog:
        type: boolean
        required: false
        default: true
        description: "Generate a CHANGELOG.md from git history and upload it to the release."

      generate_benchmarks:
        type: boolean
        required: false
        default: false
        description: "Run cargo bench, generate BENCHMARKS.md from Criterion output or the raw benchmark log, and upload it to the release."

      generate_discord_notification:
        type: boolean
        required: false
        default: true
        description: "Generate a discord notification to DreamWeave upon success."

      enable_android:
        type: boolean
        required: false
        default: false
        description: "Build and publish Android ARM64 ELF release artifacts targeting Android API level 23. This does not build an APK."

      enable_portmaster:
        type: boolean
        required: false
        default: false
        description: "Build and publish Portmaster ARM64 release artifacts targeting aarch64-unknown-linux-gnu with an AlmaLinux 8 sysroot."

concurrency:
  group: stroggforge-rust-global-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Ensure any previously-existing releases are deleted,
  # And create a new one with auto-generated changelog & workflow ID
  release_cleanup:
    if: always() && github.event_name != 'pull_request' && needs.release.result == 'success' && needs.release-linux.result == 'success' && (!inputs.enable_android || needs.release-android.result == 'success') && (!inputs.enable_portmaster || needs.release-portmaster.result == 'success')
    needs: [release, release-linux, release-android, release-portmaster]
    uses: DreamWeave-MP/StroggForge/.github/workflows/createRelease.yml@v32
    secrets: inherit

  # Run the full test suite on all platforms. Blocks release.
  test:
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel, ubuntu-22.04, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-
      - name: Run Tests
        run: cargo test --workspace --all-targets --all-features -- --show-output

  # Check formatting. Blocks release.
  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Formatting
        run: cargo fmt --all --check

  # Run Clippy at pedantic level. Blocks release.
  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -W clippy::pedantic -D warnings

  # Scan Cargo.lock against the RustSec advisory database. Blocks release.
  audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run Cargo audit
        run: cargo audit
        working-directory: ${{ github.workspace }}

  # Verify each crate would be publishable to crates.io. Informational — does not block release.
  cargo-publish-dry-run:
    if: inputs.cargo_publish && github.ref_type != 'tag'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        app_names: ${{ fromJson(inputs.binary_names) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-
      - name: Publish Dry Run
        run: |
          if [ -d "${{ matrix.app_names }}" ]; then
            cargo publish --dry-run --manifest-path ${{ matrix.app_names }}/Cargo.toml
          else
            cargo publish --dry-run
          fi

  # Publish each crate to crates.io on tagged releases, after all release builds succeed.
  cargo-publish:
    if: always() && inputs.cargo_publish && github.ref_type == 'tag' && needs.release.result == 'success' && needs.release-linux.result == 'success' && (!inputs.enable_android || needs.release-android.result == 'success') && (!inputs.enable_portmaster || needs.release-portmaster.result == 'success')
    needs: [release, release-linux, release-android, release-portmaster]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        app_names: ${{ fromJson(inputs.binary_names) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -d "${{ matrix.app_names }}" ]; then
            cargo publish --manifest-path ${{ matrix.app_names }}/Cargo.toml
          else
            cargo publish
          fi

  # Build cargo doc and deploy to GitHub Pages.
  # Requires Pages to be enabled with "GitHub Actions" as the source in repo settings.
  docs:
    if: inputs.publish_docs && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, clippy, fmt, audit]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v32
          path: .stroggforge
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-
      - name: Remove stale documentation output
        run: rm -rf target/doc
      - name: Build Documentation
        run: cargo doc --no-deps --workspace
      - name: Create Index Redirect
        run: bash .stroggforge/scripts/shared/docs-index.sh '${{ inputs.binary_names }}' target/doc/index.html
      - uses: actions/configure-pages@v6.0.0
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: target/doc
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

  # Generate a CHANGELOG.md from git history and upload it to the release.
  changelog:
    if: inputs.generate_changelog && github.event_name != 'pull_request'
    needs: [github-publish, release_cleanup]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v32
          path: .stroggforge
      - name: Generate Changelog
        run: bash .stroggforge/scripts/shared/changelog.sh CHANGELOG.md
      - name: Upload Changelog to Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.release_cleanup.outputs.release_name }}
          files: CHANGELOG.md

  # Run cargo bench, generate BENCHMARKS.md from Criterion output or the raw benchmark log, and upload to the release.
  benchmarks:
    if: inputs.generate_benchmarks && github.event_name != 'pull_request'
    needs: [github-publish, release_cleanup]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v32
          path: .stroggforge
      - uses: dtolnay/rust-toolchain@stable
        id: rust_toolchain
      - name: Cache Cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Cargo target directory
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-${{ steps.rust_toolchain.outputs.cachekey }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-target-
      - name: Remove stale benchmark output
        run: rm -rf target/criterion benchmark-output.txt BENCHMARKS.md
      - name: Generate Benchmark Docs
        run: bash .stroggforge/scripts/shared/generate-benchmark-docs.sh .stroggforge/.github/scripts/gen_benchmarks.py
      - name: Upload Benchmark Docs to Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.release_cleanup.outputs.release_name }}
          files: BENCHMARKS.md

  # Build, sign, scan, package, and stage Rust app archives on macOS and Windows.
  release:
    needs: [test, clippy, fmt, audit]

    strategy:
      matrix:
        os: [macos-latest, macos-15-intel, windows-2025-vs2026]
        app_names: ${{ fromJson(inputs.binary_names) }}

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - name: Run Corprus Crucible
        uses: DreamWeave-MP/StroggForge/.github/actions/corprus-crucible@v32
        with:
          binary_name: ${{ matrix.app_names }}
          vt_api_key: ${{ secrets.VT_API_KEY }}
          release_name: ${{ github.ref_type == 'tag' && github.ref_name || 'development' }}
          nexus_api_key: ${{ secrets.NEXUS_API_KEY }}
          nexus_group_ids: ${{ secrets.NEXUS_GROUP_IDS }}

  # Build, sign, scan, package, and stage Rust app archives on Linux.
  # Runs inside AlmaLinux 8 (glibc 2.28) for maximum distribution compatibility.
  release-linux:
    needs: [test, clippy, fmt, audit]

    strategy:
      matrix:
        app_names: ${{ fromJson(inputs.binary_names) }}

    runs-on: ubuntu-latest
    container: almalinux:8

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Install Build Dependencies
        run: dnf install -y epel-release && dnf install -y git python3 gcc gcc-c++ make gettext glibc-devel pkgconf-pkg-config openssl-devel p7zip p7zip-plugins && mkdir -p /home/runner/work && { [ -e /home/runner/work/_actions ] || ln -s /__w/_actions /home/runner/work/_actions; }
      - uses: actions/checkout@v6
      - name: Run Corprus Crucible
        uses: DreamWeave-MP/StroggForge/.github/actions/corprus-crucible@v32
        with:
          binary_name: ${{ matrix.app_names }}
          vt_api_key: ${{ secrets.VT_API_KEY }}
          release_name: ${{ github.ref_type == 'tag' && github.ref_name || 'development' }}
          nexus_api_key: ${{ secrets.NEXUS_API_KEY }}
          nexus_group_ids: ${{ secrets.NEXUS_GROUP_IDS }}

  # Build, sign, scan, package, and stage Android ARM64 ELF artifacts.
  # Android builds target API level 23. Keep this fixed until a consumer actually needs another minSdk.
  # This deliberately does not build an APK; it only validates and publishes the native Rust artifact.
  release-android:
    if: inputs.enable_android
    needs: [test, clippy, fmt, audit]

    strategy:
      matrix:
        app_names: ${{ fromJson(inputs.binary_names) }}
        android_target: [aarch64-linux-android]

    runs-on: ubuntu-latest

    env:
      ANDROID_API_LEVEL: '23'

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Install Archive Dependencies
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      - uses: actions/checkout@v6
      - name: Setup Android NDK
        id: setup_ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - name: Run Corprus Crucible
        uses: DreamWeave-MP/StroggForge/.github/actions/corprus-crucible@v32
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: ${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CC_aarch64_linux_android: ${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang
          CXX_aarch64_linux_android: ${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang++
          AR_aarch64_linux_android: ${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CMAKE_TOOLCHAIN_FILE: ${{ steps.setup_ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake
          ANDROID_ABI: arm64-v8a
          ANDROID_PLATFORM: android-${{ env.ANDROID_API_LEVEL }}
          BINDGEN_EXTRA_CLANG_ARGS: --sysroot=${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          PKG_CONFIG_ALLOW_CROSS: '1'
        with:
          binary_name: ${{ matrix.app_names }}
          vt_api_key: ${{ secrets.VT_API_KEY }}
          release_name: ${{ github.ref_type == 'tag' && github.ref_name || 'development' }}
          nexus_api_key: ${{ secrets.NEXUS_API_KEY }}
          nexus_group_ids: ${{ secrets.NEXUS_GROUP_IDS }}
          platform_os: Android
          platform_arch: ARM64
          rust_target: ${{ matrix.android_target }}

  # Build, sign, scan, package, and stage Portmaster ARM64 artifacts.
  # Uses AlmaLinux 8 target libraries so the aarch64-unknown-linux-gnu artifact keeps the same old-glibc compatibility posture as the native Linux release.
  release-portmaster:
    if: inputs.enable_portmaster
    needs: [test, clippy, fmt, audit]

    strategy:
      matrix:
        app_names: ${{ fromJson(inputs.binary_names) }}

    runs-on: ubuntu-latest
    container: almalinux:8

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Install Build Dependencies
        run: >-
          dnf install -y epel-release
          && dnf --installroot=/usr/aarch64-linux-gnu/sys-root --releasever=8 --forcearch=aarch64 install -y glibc-devel libstdc++-devel libgcc openssl-devel
          && dnf install -y git python3 make gettext pkgconf-pkg-config p7zip p7zip-plugins gcc-aarch64-linux-gnu gcc-c++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          && mkdir -p /home/runner/work
          && { [ -e /home/runner/work/_actions ] || ln -s /__w/_actions /home/runner/work/_actions; }
      - uses: actions/checkout@v6
      - name: Run Corprus Crucible
        uses: DreamWeave-MP/StroggForge/.github/actions/corprus-crucible@v32
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          BINDGEN_EXTRA_CLANG_ARGS: --target=aarch64-unknown-linux-gnu --sysroot=/usr/aarch64-linux-gnu/sys-root
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu/sys-root
          PKG_CONFIG_LIBDIR: /usr/aarch64-linux-gnu/sys-root/usr/lib64/pkgconfig:/usr/aarch64-linux-gnu/sys-root/usr/share/pkgconfig
        with:
          binary_name: ${{ matrix.app_names }}
          vt_api_key: ${{ secrets.VT_API_KEY }}
          release_name: ${{ github.ref_type == 'tag' && github.ref_name || 'development' }}
          nexus_api_key: ${{ secrets.NEXUS_API_KEY }}
          nexus_group_ids: ${{ secrets.NEXUS_GROUP_IDS }}
          platform_os: Portmaster
          platform_arch: ARM64
          rust_target: aarch64-unknown-linux-gnu

  # Publish staged platform archives to the freshly-created GitHub Release.
  github-publish:
    if: github.event_name != 'pull_request'
    needs: [release_cleanup]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download GitHub Release Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: github-release-*
          path: .corprus-crucible/github-release-downloads
          merge-multiple: true

      - name: Collect VirusTotal Release Notes
        id: release_body
        shell: bash
        run: |
          body_file=.corprus-crucible/github-release-downloads/release-body.md
          : > "$body_file"
          shopt -s nullglob
          for vt_file in .corprus-crucible/github-release-downloads/*.vt.md; do
            if [ -s "$vt_file" ]; then
              printf '%s\n' "$(< "$vt_file")" >> "$body_file"
            fi
          done
          echo "body_path=$body_file" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.release_cleanup.outputs.release_name }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: .corprus-crucible/github-release-downloads/*.zip
          append_body: true
          body_path: ${{ steps.release_body.outputs.body_path }}

  # Publish Nexus Mods files after all platform archives are built.
  nexus-publish:
    if: always() && github.event_name != 'pull_request' && needs.release.result == 'success' && needs.release-linux.result == 'success' && (!inputs.enable_android || needs.release-android.result == 'success') && (!inputs.enable_portmaster || needs.release-portmaster.result == 'success')
    needs: [release, release-linux, release-android, release-portmaster]
    runs-on: ubuntu-latest
    env:
      NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
      NEXUS_GROUP_IDS: ${{ secrets.NEXUS_GROUP_IDS }}

    strategy:
      fail-fast: false
      matrix:
        app_names: ${{ fromJson(inputs.binary_names) }}
        platform:
          - os: macOS
            arch: ARM64
          - os: macOS
            arch: X64
          - os: Windows
            arch: X64
          - os: Linux
            arch: X64
          - os: Android
            arch: ARM64
          - os: Portmaster
            arch: ARM64

    steps:
      - uses: actions/checkout@v6
        if: (env.NEXUS_API_KEY != '' || env.NEXUS_GROUP_IDS != '') && (matrix.platform.os != 'Portmaster' || inputs.enable_portmaster)
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v32
          path: .stroggforge

      - name: Download Nexus Mods Upload Artifact
        if: (env.NEXUS_API_KEY != '' || env.NEXUS_GROUP_IDS != '') && (matrix.platform.os != 'Portmaster' || inputs.enable_portmaster)
        id: download_nexus_artifact
        continue-on-error: true
        uses: actions/download-artifact@v8.0.1
        with:
          name: nexus-${{ matrix.app_names }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: .corprus-crucible/nexus-downloads/nexus-${{ matrix.app_names }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}

      - name: Read Nexus Mods Upload Artifact
        if: (env.NEXUS_API_KEY != '' || env.NEXUS_GROUP_IDS != '') && steps.download_nexus_artifact.outcome == 'success'
        id: nexus_upload
        run: >-
          bash .stroggforge/scripts/corprus-crucible/read-nexusmods-upload-artifact.sh
          ".corprus-crucible/nexus-downloads/nexus-${{ matrix.app_names }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}"

      - name: Upload to Nexus Mods
        if: (env.NEXUS_API_KEY != '' || env.NEXUS_GROUP_IDS != '') && steps.download_nexus_artifact.outcome == 'success'
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ steps.nexus_upload.outputs.group_id }}
          filename: ${{ steps.nexus_upload.outputs.filename }}
          display_name: ${{ steps.nexus_upload.outputs.display_name }}
          version: ${{ steps.nexus_upload.outputs.version }}
          description: ${{ steps.nexus_upload.outputs.description }}
          archive_existing_file: ${{ steps.nexus_upload.outputs.archive_existing_file }}

  # For application repositories which are also hosted in the AUR,
  # update the AUR package as well.
  aur-publish:
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && inputs.aur_package_name != '' && needs.release.result == 'success' && needs.release-linux.result == 'success' && (!inputs.enable_android || needs.release-android.result == 'success') && (!inputs.enable_portmaster || needs.release-portmaster.result == 'success')
    needs: [release, release-linux, release-android, release-portmaster]
    environment: AUR

    steps:
      - uses: actions/checkout@v6
      - uses: varrcan/aur-publish-action@v1
        with:
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          package_name: ${{ inputs.aur_package_name }}
          git_username: ${{ inputs.git_username }}
          git_email: ${{ inputs.git_email }}

  # For workflows where users may now receive a new deliverable, notify them about it!
  call-discord-webhook:
    if: always() && inputs.generate_discord_notification && github.event_name == 'push'
    needs: [changelog, nexus-publish, cargo-publish, aur-publish]
    uses: DreamWeave-MP/StroggForge/.github/workflows/discord.yml@v32
    secrets:
      WEBHOOK_URL: ${{ secrets.DISCORD_CHANNEL_WEBHOOK || secrets.DW_TOOLS_CHANNEL_WEBHOOK }}
    with:
      title: ${{ ((inputs.generate_changelog && needs.changelog.result != 'success') || needs['nexus-publish'].result == 'failure' || needs['cargo-publish'].result == 'failure' || needs['aur-publish'].result == 'failure') && format('{0} pipeline failed! 😭', github.event.repository.name) || '' }}
      description: ${{ ((inputs.generate_changelog && needs.changelog.result != 'success') || needs['nexus-publish'].result == 'failure' || needs['cargo-publish'].result == 'failure' || needs['aur-publish'].result == 'failure') && format('[Workflow Results](https://github.com/{0}/actions/runs/{1})', github.repository, github.run_id) || (inputs.aur_package_name != '' && format('[{0}](https://github.com/{1}/releases/tag/{0}) is now available on GitHub and the AUR.', github.ref_type == 'tag' && github.ref_name || 'development', github.repository) || format('[{0}](https://github.com/{1}/releases/tag/{0}) is now available on GitHub.', github.ref_type == 'tag' && github.ref_name || 'development', github.repository)) }}

  # For any repositories which use this one as a dependent,
  # notify them by creating an issue within the DreamWeave org's scope.
  nag-dependents:
    if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && inputs.dependent_repo_names != '' && inputs.dependent_repo_names != '[]'
    needs: [github-publish]

    uses: DreamWeave-MP/StroggForge/.github/workflows/dependent.yml@v32

    secrets:
      DW_BOT_PAT: ${{ secrets.DW_BOT_PAT }}
    with:
      aur_package_name: ${{ inputs.aur_package_name }}
      dependent_repo_names: ${{ inputs.dependent_repo_names }}
