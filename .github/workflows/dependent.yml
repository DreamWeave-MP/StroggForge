name: Notify DreamWeave Ecosystem

on:
  workflow_call:
    secrets:
      DW_BOT_PAT:
        required: true

    inputs:
      aur_package_name:
        type: string
        required: true
      target_repo:
        type: string
        required: true

jobs:
  notify-dependents:
    name: Notify Dependent Repositories
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: DreamWeave-MP/StroggForge
          ref: v19
          path: .stroggforge

      - name: Create Update Issue
        env:
          GH_TOKEN: ${{ secrets.DW_BOT_PAT }}
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: bash .stroggforge/scripts/shared/create-dependent-update-issue.sh '${{ inputs.target_repo }}' '${{ inputs.aur_package_name }}'
