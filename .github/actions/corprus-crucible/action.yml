name: 'Corprus Crucible'
description: 'Strogg manufacturing system for Rust binaries - builds, signs, and scans releases'

inputs:
  binary_name:
    description: 'Name of the binary (without platform suffix)'
    required: true
  include_files:
    description: 'Additional files to include in archives (comma-separated)'
    required: false
    default: 'Readme.md,LICENSE'
  vt_api_key:
    description: 'VirusTotal API key (REQUIRED)'
    required: true
  github_token:
    description: 'GitHub Token (REQUIRED)'
    required: true
  release_name:
    description: 'Name of the release (tag or development)'
    required: true
  nexus_api_key:
    description: 'Nexus Mods API key. Provide with nexus_group_ids to upload release archives to Nexus Mods.'
    required: false
    default: ''
  nexus_group_ids:
    description: 'Nexus Mods file group IDs as JSON. Provide with nexus_api_key to upload release archives to Nexus Mods.'
    required: false
    default: ''
  # cargo_token:
  #   description: 'If provided, the token is used to publish the target app to crates.io'
  #   required: false
  #   default: ''

runs:
  using: composite
  steps:
    # Validate required VirusTotal API key
    - name: Validate VirusTotal API Key
      shell: bash
      run: bash "${{ github.action_path }}/../../../scripts/corprus-crucible/validate-virustotal-key.sh" "${{ inputs.vt_api_key }}"

    - name: Determine Binary Suffix
      id: os_check
      shell: bash
      run: bash "${{ github.action_path }}/../../../scripts/corprus-crucible/binary-suffix.sh" "${{ runner.os }}"

    - name: Determine Build Context
      id: context
      shell: bash
      run: bash "${{ github.action_path }}/../../../scripts/corprus-crucible/resolve-build-context.sh" "${{ inputs.binary_name }}"

    # Build steps
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      id: rust_toolchain

    - name: ⚡ Cache Cargo registry
      uses: actions/cache@v5.0.5
      if: github.event_name != 'pull_request'
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: ⚡ Cache Cargo target directory
      uses: actions/cache@v5.0.5
      if: github.event_name != 'pull_request'
      with:
        path: |
          ${{ steps.context.outputs.target_dir }}
        key: ${{ runner.os }}-${{ runner.arch }}-release-target-${{ inputs.binary_name }}-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Release
      id: build_release
      shell: bash
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/build-release-binary.sh"
        "${{ inputs.binary_name }}"
        "${{ steps.os_check.outputs.suffix }}"
        "${{ steps.context.outputs.build_dir }}"
        "${{ steps.context.outputs.target_dir }}"
        "${{ steps.context.outputs.dist_dir }}"

    # - name: Cargo Publish
    #   if: ${{ inputs.cargo_token }} != '' && ${{ inputs.release_name }} != 'development'
    #   shell: bash
    #   run: cargo publish --manifest-path ${{ steps.context.outputs.build_dir }}/Cargo.toml --token ${{ inputs.cargo_token }}

    - name: Install Cosign
      if: github.event_name != 'pull_request'
      uses: sigstore/cosign-installer@main

    - name: Sign Binary
      shell: bash
      if: github.event_name != 'pull_request'
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/sign-release-binary.sh"
        "${{ steps.build_release.outputs.release_binary }}"
        "${{ steps.context.outputs.dist_dir }}/${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}.bundle"

    - name: Create Archive
      shell: bash
      if: github.event_name != 'pull_request'
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/create-release-archive.sh"
        "${{ inputs.binary_name }}"
        "${{ runner.os }}"
        "${{ runner.arch }}"
        "${{ steps.build_release.outputs.binary_name }}"
        "${{ steps.context.outputs.build_dir }}"
        "${{ steps.context.outputs.dist_dir }}"
        "${{ inputs.include_files }}"

    - name: VirusTotal Scan
      if: github.event_name != 'pull_request'
      id: vt_scan
      uses: crazy-max/ghaction-virustotal@v5
      with:
        update_release_body: true
        vt_api_key: ${{ inputs.vt_api_key }}
        files: ${{ steps.build_release.outputs.release_binary }}

    - name: Format VirusTotal Links
      if: github.event_name != 'pull_request'
      id: format_vt_links
      shell: bash
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/format-virustotal-links.sh"
        "${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}"
        "${{ steps.vt_scan.outputs.analysis }}"

    - name: Validate Nexus Mods Inputs
      if: github.event_name != 'pull_request' && (inputs.nexus_api_key != '' || inputs.nexus_group_ids != '')
      shell: bash
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/validate-nexusmods-inputs.sh"
        "${{ inputs.nexus_api_key }}"
        "${{ inputs.nexus_group_ids }}"

    - name: Resolve Nexus Mods Group ID
      if: github.event_name != 'pull_request' && inputs.nexus_api_key != '' && inputs.nexus_group_ids != ''
      id: nexus_group
      shell: bash
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/resolve-nexusmods-group-id.sh"
        "${{ inputs.nexus_group_ids }}"
        "${{ runner.os }}"
        "${{ runner.arch }}"
        "${{ inputs.release_name }}"

    - name: Prepare Nexus Mods Archive
      if: github.event_name != 'pull_request' && inputs.nexus_api_key != '' && steps.nexus_group.outputs.group_id != ''
      id: nexus_archive
      shell: bash
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/prepare-nexusmods-archive.sh"
        "${{ inputs.binary_name }}"
        "${{ runner.os }}"
        "${{ runner.arch }}"
        "${{ steps.nexus_group.outputs.nexus_platform }}"
        "${{ inputs.release_name }}"

    - name: Upload to Nexus Mods
      if: github.event_name != 'pull_request' && inputs.nexus_api_key != '' && steps.nexus_group.outputs.group_id != ''
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ inputs.nexus_api_key }}
        file_group_id: ${{ steps.nexus_group.outputs.group_id }}
        filename: ${{ steps.nexus_archive.outputs.nexus_archive }}
        display_name: ${{ steps.nexus_archive.outputs.nexus_file_stem }}
        version: ${{ inputs.release_name }}
        description: |
          ${{ inputs.binary_name }} release archive for ${{ runner.os }}-${{ runner.arch }}.

          ${{ steps.format_vt_links.outputs.vt_analysis }}
        archive_existing_file: ${{ inputs.release_name == 'development' }}

    - name: Upload to GitHub Release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v3.0.0
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        tag_name: ${{ inputs.release_name }}
        prerelease: ${{ github.ref_type != 'tag' }}
        files: ${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}.zip
        append_body: true
        body: |
          ${{ steps.format_vt_links.outputs.vt_analysis }}

    - name: Upload artifact (for PRs)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}
        path: ${{ steps.build_release.outputs.release_binary }}
        retention-days: 7
