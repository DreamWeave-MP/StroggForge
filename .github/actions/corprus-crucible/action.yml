name: 'Corprus Crucible'
description: 'Strogg manufacturing system for Rust binaries - builds, signs, and scans releases'

inputs:
  binary_name:
    description: 'Name of the binary (without platform suffix)'
    required: true
  include_files:
    description: 'Additional files to include in archives (comma-separated)'
    required: false
    default: 'Readme.md,LICENSE'
  vt_api_key:
    description: 'VirusTotal API key (REQUIRED)'
    required: true
  github_token:
    description: 'GitHub Token (REQUIRED)'
    required: true
  release_name:
    description: 'Name of the release (tag or development)'
    required: true
  # cargo_token:
  #   description: 'If provided, the token is used to publish the target app to crates.io'
  #   required: false
  #   default: ''

runs:
  using: composite
  steps:
    # Validate required VirusTotal API key
    - name: Validate VirusTotal API Key
      shell: bash
      run: bash "${{ github.action_path }}/../../../scripts/corprus-crucible/validate-virustotal-key.sh" "${{ inputs.vt_api_key }}"

    - name: Determine Binary Suffix
      id: os_check
      shell: bash
      run: bash "${{ github.action_path }}/../../../scripts/corprus-crucible/binary-suffix.sh" "${{ runner.os }}"

    - name: Determine Build Context
      id: context
      shell: bash
      run: bash "${{ github.action_path }}/../../../scripts/corprus-crucible/resolve-build-context.sh" "${{ inputs.binary_name }}"

    # Build steps
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      id: rust_toolchain

    - name: ⚡ Cache Cargo registry
      uses: actions/cache@v5.0.5
      if: github.event_name != 'pull_request'
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: ⚡ Cache Cargo target directory
      uses: actions/cache@v5.0.5
      if: github.event_name != 'pull_request'
      with:
        path: |
          ${{ steps.context.outputs.target_dir }}
        key: ${{ runner.os }}-${{ runner.arch }}-release-target-${{ inputs.binary_name }}-${{ steps.rust_toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Release
      id: build_release
      shell: bash
      run: >-
        bash "${{ github.action_path }}/../../../scripts/corprus-crucible/build-release-binary.sh"
        "${{ inputs.binary_name }}"
        "${{ steps.os_check.outputs.suffix }}"
        "${{ steps.context.outputs.build_dir }}"
        "${{ steps.context.outputs.target_dir }}"
        "${{ steps.context.outputs.dist_dir }}"

    # - name: Cargo Publish
    #   if: ${{ inputs.cargo_token }} != '' && ${{ inputs.release_name }} != 'development'
    #   shell: bash
    #   run: cargo publish --manifest-path ${{ steps.context.outputs.build_dir }}/Cargo.toml --token ${{ inputs.cargo_token }}

    - name: Install Cosign
      if: github.event_name != 'pull_request'
      uses: sigstore/cosign-installer@main

    - name: Sign Binary
      shell: bash
      if: github.event_name != 'pull_request'
      run: |
        cosign sign-blob -y "${{ steps.build_release.outputs.release_binary }}" \
          --bundle "${{ steps.context.outputs.dist_dir }}/${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}.bundle"

    - name: Create Archive
      shell: bash
      if: github.event_name != 'pull_request'
      run: |
        ARCHIVE_NAME="${{ inputs.binary_name}}-${{ runner.os }}-${{ runner.arch }}.zip"
        ARCHIVE_PATH="$PWD/$ARCHIVE_NAME"
        DIST_DIR="${{ steps.context.outputs.dist_dir }}"
        BUNDLE_NAME="${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}.bundle"
        INCLUDE_NAMES=("${{ steps.build_release.outputs.binary_name }}" "$BUNDLE_NAME")

        if [ -n "${{ inputs.include_files }}" ]; then
          IFS=',' read -ra USER_FILES <<< "${{ inputs.include_files }}"
          for file in "${USER_FILES[@]}"; do
            file="${file#${file%%[![:space:]]*}}"
            file="${file%${file##*[![:space:]]}}"
            if [ -f "./${{ steps.context.outputs.build_dir }}/$file" ]; then
              include_name="$(basename "$file")"
              cp "./${{ steps.context.outputs.build_dir }}/$file" "$DIST_DIR/$include_name"
              INCLUDE_NAMES+=("$include_name")
            fi
          done
        fi

        pushd "$DIST_DIR" >/dev/null
        7z a -tzip "$ARCHIVE_PATH" "${INCLUDE_NAMES[@]}"
        popd >/dev/null

    - name: VirusTotal Scan
      if: github.event_name != 'pull_request'
      id: vt_scan
      uses: crazy-max/ghaction-virustotal@v5
      with:
        update_release_body: true
        vt_api_key: ${{ inputs.vt_api_key }}
        files: ${{ steps.build_release.outputs.release_binary }}

    - name: Format VirusTotal Links
      if: github.event_name != 'pull_request'
      id: format_vt_links
      shell: bash
      run: |
        # Extract just the filename for display
        FILENAME="${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}"

        # The vt_scan outputs.analysis is like "filename=https://virustotal.com/..."
        # Parse it to create markdown links
        if [ -n "${{ steps.vt_scan.outputs.analysis }}" ]; then
          # Convert "filename=url,filename2=url2" to markdown
          ANALYSIS_TEXT=""
          IFS=',' read -ra ENTRIES <<< "${{ steps.vt_scan.outputs.analysis }}"

          for entry in "${ENTRIES[@]}"; do
            IFS='=' read -r file url <<< "$entry"
            ANALYSIS_TEXT="${ANALYSIS_TEXT}- [${FILENAME} on VirusTotal](${url})"$'\n'
          done

          echo "vt_analysis=${ANALYSIS_TEXT}" >> $GITHUB_OUTPUT
        else
          echo "vt_analysis=" >> $GITHUB_OUTPUT
        fi

    - name: Upload to GitHub Release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v3.0.0
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        tag_name: ${{ inputs.release_name }}
        prerelease: ${{ github.ref_type != 'tag' }}
        files: ${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}.zip
        append_body: true
        body: |
          ${{ steps.format_vt_links.outputs.vt_analysis }}

    - name: Upload artifact (for PRs)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.binary_name }}-${{ runner.os }}-${{ runner.arch }}
        path: ${{ steps.build_release.outputs.release_binary }}
        retention-days: 7
